    <!-- Right Section -->

        <h2 style="font-family: 'Vetrino', serif; font-size: 32px; margin-bottom: 20px; color: #000;">Поиск по сайту</h2>
        <input type="text" id="searchInput" class="search-input" placeholder="Введите название выставки, экскурсии или мероприятия..." autocomplete="off">
        <div id="searchResults" class="search-results">
