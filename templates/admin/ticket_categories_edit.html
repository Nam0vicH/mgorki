{% extends "admin/base.html" %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">{{ 'Редактировать' if category else 'Добавить' }} категорию билетов</h1>
</div>

<div class="admin-card">
    <form method="POST" class="admin-form">
        <div class="form-group">
            <label class="form-label">Тип билета</label>
            <select name="category" class="form-control" required>
                <option value="museum" {% if category and category.category == 'museum' %}selected{% endif %}>Билет в музей / на выставку</option>
                <option value="poster" {% if category and category.category == 'poster' %}selected{% endif %}>Билет на мероприятие (Афиша)</option>
            </select>
        </div>

        <div class="form-group">
            <label class="form-label">Название категории (например: Взрослый, Школьный)</label>
            <input type="text" name="title" class="form-control" value="{{ category.title if category else '' }}" required>
        </div>

        <div class="form-group">
            <label class="form-label">Цена (₽)</label>
            <input type="number" step="0.01" name="price" class="form-control" value="{{ category.price if category else '0.00' }}" required>
        </div>

        <div class="form-group">
            <label class="form-label">Описание / Условия (необязательно)</label>
            <textarea name="description" class="form-control" rows="3">{{ category.description if category else '' }}</textarea>
        </div>

        <div class="form-actions" style="margin-top: 30px;">
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="{{ url_for('admin_ticket_categories') }}" class="btn btn-danger">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
